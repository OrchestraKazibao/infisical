name: Build and deploy Docker image to Azure Container Registry
run-name: Build and deploy Docker image to Azure Container Registry on ${{ inputs.environnement }} environment

on:
    workflow_dispatch:
        inputs:
            environnement:
                description: "GitHub environment containing ACR secrets"
                required: true
                type: environment

permissions:
    contents: read

jobs:
    build-and-push-to-acr:
        name: Build and push image to Azure Container Registry
        runs-on: ubuntu-latest
        environment: ${{ inputs.environnement }}
        steps:
            - name: Extract version from tag
              id: extract_version
              run: |
                echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            - name: ☁️ Checkout source
              uses: actions/checkout@v3
              with:
                fetch-depth: 0

            - name: Save commit hashes for tag
              id: commit
              uses: pr-mpt/actions-commit-hash@v2

            - name: 🔧 Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: 🔑 Login to Azure Container Registry
              uses: docker/login-action@v2
              with:
                registry: ${{ vars.AZURE_REGISTRY_NAME }}.azurecr.io
                username: ${{ vars.AZURE_CLIENT_ID }}
                password: ${{ secrets.AZURE_CLIENT_SECRET }}

            - name: 📦 Build and push Docker image to ACR
              uses: docker/build-push-action@v5
              with:
                  push: true
                  context: ./backend
                  tags: |
                      ${{ secrets.ACR_REGISTRY_URL }}/infisical:latest
                      ${{ secrets.ACR_REGISTRY_URL }}/infisical:${{ steps.commit.outputs.short }}
                      ${{ secrets.ACR_REGISTRY_URL }}/infisical:${{ steps.extract_version.outputs.version }}
                  platforms: linux/amd64,linux/arm64
                  file: backend/Dockerfile
