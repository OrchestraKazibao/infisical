name: Build and deploy Docker image to Azure Container Registry

on:
    push:
        tags:
            - "v*.*.*"
            - "v*.*.*-nightly-*"
            - "v*.*.*-nightly-*.*"

permissions:
    contents: read

jobs:
    infisical-tests:
        name: Run tests before deployment
        uses: ./.github/workflows/run-backend-tests.yml

    build-and-push-to-acr:
        name: Build and push image to Azure Container Registry
        runs-on: ubuntu-latest
        needs: [infisical-tests]
        steps:
            - name: Extract version from tag
              id: extract_version
              run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

            - name: ☁️ Checkout source
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            - name: 📦 Install dependencies to test all dependencies
              run: npm ci --only-production
              working-directory: backend

            - name: Save commit hashes for tag
              id: commit
              uses: pr-mpt/actions-commit-hash@v2

            - name: 🔧 Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: 🔑 Login to Azure Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ${{ secrets.ACR_REGISTRY_URL }}
                  username: ${{ secrets.ACR_USERNAME }}
                  password: ${{ secrets.ACR_PASSWORD }}

            - name: 📦 Build and push Docker image to ACR
              uses: docker/build-push-action@v5
              with:
                  push: true
                  context: .
                  tags: |
                      ${{ secrets.ACR_REGISTRY_URL }}/infisical:latest
                      ${{ secrets.ACR_REGISTRY_URL }}/infisical:${{ steps.commit.outputs.short }}
                      ${{ secrets.ACR_REGISTRY_URL }}/infisical:${{ steps.extract_version.outputs.version }}
                  platforms: linux/amd64,linux/arm64
                  file: Dockerfile.standalone-infisical
                  build-args: |
                      POSTHOG_API_KEY=${{ secrets.PUBLIC_POSTHOG_API_KEY }}
                      INFISICAL_PLATFORM_VERSION=${{ steps.extract_version.outputs.version }}
