name: Build and deploy Docker image to Azure Container Registry

on:
    push:
        tags:
            - "v*.*.*"
            - "v*.*.*-nightly-*"
            - "v*.*.*-nightly-*.*"
    workflow_dispatch:
        inputs:
            environment:
                description: "GitHub environment containing ACR secrets"
                required: true
                type: environment

permissions:
    contents: read

jobs:
    infisical-tests:
        name: Run tests before deployment
        uses: ./.github/workflows/run-backend-tests.yml

    build-and-push-to-acr:
        name: Build and push image to Azure Container Registry
        runs-on: ubuntu-latest
        needs: [infisical-tests]
        environment: ${{ github.event.inputs.environment || 'azure' }}
        steps:
            - name: Extract version from tag
              id: extract_version
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
                  else
                    echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
                  fi

            - name: ☁️ Checkout source
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            - name: Save commit hashes for tag
              id: commit
              uses: pr-mpt/actions-commit-hash@v2

            - name: 🔧 Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: 🔑 Login to Azure Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ${{ secrets.ACR_REGISTRY_URL }}
                  username: ${{ secrets.ACR_USERNAME }}
                  password: ${{ secrets.ACR_PASSWORD }}

            - name: 📦 Build and push Docker image to ACR
              uses: docker/build-push-action@v5
              with:
                  push: true
                  context: ./backend
                  tags: |
                      ${{ secrets.ACR_REGISTRY_URL }}/infisical:latest
                      ${{ secrets.ACR_REGISTRY_URL }}/infisical:${{ steps.commit.outputs.short }}
                      ${{ secrets.ACR_REGISTRY_URL }}/infisical:${{ steps.extract_version.outputs.version }}
                  platforms: linux/amd64,linux/arm64
                  file: backend/Dockerfile
