name: Build and deploy Docker image to Azure Container Registry
run-name: Build and deploy Docker image to Azure Container Registry on ${{ inputs.environnement }} environment

on:
    workflow_dispatch:
        inputs:
            environnement:
                description: "GitHub environment containing ACR secrets"
                required: true
                type: environment

jobs:
    build-and-push-to-acr:
        name: Build and push image to Azure Container Registry
        runs-on: ubuntu-latest
        environment: ${{ inputs.environnement }}
        steps:
            - name: Extract version from tag
              id: extract_version
              run: |
                echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            - name: ☁️ Checkout source
              uses: actions/checkout@v3
              with:
                fetch-depth: 0

            - name: Save commit hashes for tag
              id: commit
              uses: pr-mpt/actions-commit-hash@v2

            - name: 🔧 Set up Docker Buildx
              uses: docker/setup-buildx-action@v2
            - name: Az CLI Login
              uses: Azure/login@v2
              with:
                creds: '{"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

            - name: ACR Login
              shell: bash
              run: |
                az acr login --name ${{ vars.AZURE_REGISTRY_NAME }}

            - name: Build DockerImage
              shell: bash
              working-directory: .
              run: |
                docker build ${{ inputs.buildArgs}} . -f Dockerfile.standalone-infisical -t ${{ vars.AZURE_REGISTRY_NAME }}.azurecr.io/infisical:${{ steps.extract_version.outputs.version }}
                az acr run --cmd "acr purge --filter 'infisical:.*' --untagged --ago 1d --keep 10" --registry ${{ vars.AZURE_REGISTRY_NAME }} /dev/null
                docker push ${{ vars.AZURE_REGISTRY_NAME }}.azurecr.io/infisical:${{ steps.extract_version.outputs.version }}
